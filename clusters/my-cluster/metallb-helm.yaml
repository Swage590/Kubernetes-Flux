apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 30m
  url: https://metallb.github.io/metallb
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: helm-metallb
  namespace: flux-system
spec:
  providerRef:
    name: discord-flux-chan
  eventSeverity: info
  eventSources:
  - kind: HelmRepository
    name: metallb
  - kind: HelmChart
    name: default-metallb
  - kind: HelmRelease
    name: metallb
    namespace: metallb-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 10m
  chart:
    spec:
      chart: metallb
      sourceRef:
        kind: HelmRepository
        name: metallb
  values:
    # Explicitly define the missing serviceMonitor structure to prevent the nil pointer panic that was preventing updates 5-20-2026
    prometheus:
      serviceMonitor:
        enabled: false
    frr-k8s:
      prometheus:
        serviceMonitor:
          enabled: false
    ipAddressPools:
      - name: default
        addresses:
          - 10.59.20.70-10.59.20.79
    l2Advertisements:
      - name: default
        ipAddressPools:
          - default
